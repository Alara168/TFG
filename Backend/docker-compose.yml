services:
  db:
    image: postgres:15
    container_name: postgres_tfg
    restart: always
    environment:
      - POSTGRES_DB=tfg_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: